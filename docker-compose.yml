version: "3.9"
services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - CHROMA_PERSIST_DIR=/app/chroma_store
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT=${MLFLOW_EXPERIMENT}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - GEMINI_EMBEDDING_MODEL=${GEMINI_EMBEDDING_MODEL}
      - RERANK_TOP_K=5
    volumes:
      - ./chroma_store:/app/chroma_store
      - ./mlruns:/app/mlruns
  mlflow:
    image: python:3.12-slim
    command: bash -lc "pip install --no-cache-dir mlflow && mlflow server --host 0.0.0.0 --port 5000 --default-artifact-root /app/mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
